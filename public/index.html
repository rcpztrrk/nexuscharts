<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusCharts - WASM/WebGL Demo</title>
    <style>
        :root {
            --page-bg: #1e1e24;
            --page-text: #ffffff;
            --container-border: rgba(120, 148, 188, 0.32);
            --container-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            --shell-bg: rgba(12, 22, 40, 0.85);
            --shell-border: rgba(120, 148, 188, 0.4);
            --shell-hover: rgba(156, 186, 232, 0.7);
            --shell-text: #dce7ff;
            --shell-muted: #9bb3d6;
            --shell-subtle: #7fa1d0;
            --shell-hint: #6f86aa;
            --shell-accent: #ffcc66;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--page-bg);
            color: var(--page-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #chart-container {
            width: min(92vw, 960px);
            height: min(68vh, 680px);
            min-height: 360px;
            border: 1px solid var(--container-border);
            box-shadow: var(--container-shadow);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #metrics-label {
            margin-top: 12px;
            color: var(--shell-muted);
            font-size: 13px;
            letter-spacing: 0.2px;
        }

        #perf-label {
            margin-top: 6px;
            color: var(--shell-subtle);
            font-size: 12px;
            letter-spacing: 0.2px;
        }

        #stream-toggle,
        .toolbar-card {
            margin-top: 0;
            padding: 6px 12px;
            border: 1px solid var(--shell-border);
            border-radius: 6px;
            background: var(--shell-bg);
            color: var(--shell-text);
            font-size: 12px;
            letter-spacing: 0.2px;
        }

        #stream-toggle {
            cursor: pointer;
        }

        #stream-toggle.is-paused {
            color: var(--shell-accent);
            border-color: color-mix(in srgb, var(--shell-accent) 60%, transparent);
        }

        #toolbar {
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toolbar-card {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
        }

        #dataset-size,
        #theme-preset {
            padding: 4px 6px;
            border-radius: 4px;
            border: 1px solid var(--shell-border);
            background: color-mix(in srgb, var(--shell-bg) 76%, #07121d);
            color: var(--shell-text);
            font-size: 12px;
        }

        #dataset-load {
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--shell-border);
            background: color-mix(in srgb, var(--shell-bg) 70%, #143045);
            color: var(--shell-text);
            font-size: 12px;
            cursor: pointer;
        }

        #dataset-load:hover {
            border-color: var(--shell-hover);
        }

        #dataset-status {
            color: var(--shell-muted);
            font-size: 11px;
            letter-spacing: 0.2px;
        }

        #ux-hint {
            margin-top: 8px;
            color: var(--shell-hint);
            font-size: 12px;
            letter-spacing: 0.2px;
        }
    </style>
</head>

<body>
    <h2>NexusCharts (WASM/WebGL Demo)</h2>
    <div id="toolbar">
        <div class="toolbar-card" id="benchmark-bar">
            <span>Dataset</span>
            <select id="dataset-size">
                <option value="200">200</option>
                <option value="2000">2,000</option>
                <option value="10000">10,000</option>
                <option value="50000">50,000</option>
                <option value="100000">100,000</option>
                <option value="250000">250,000</option>
                <option value="500000">500,000</option>
                <option value="1000000">1,000,000 (slow)</option>
            </select>
            <button id="dataset-load">Load</button>
            <span id="dataset-status">Size: 42</span>
        </div>
        <div class="toolbar-card" id="theme-bar">
            <span>Theme</span>
            <select id="theme-preset">
                <option value="midnight">Midnight</option>
                <option value="ocean">Ocean</option>
                <option value="ember">Ember</option>
            </select>
        </div>
        <button id="stream-toggle">Stream: On</button>
    </div>
    <div id="chart-container">
        <canvas id="canvas" width="800" height="600"></canvas>
    </div>
    <div id="metrics-label">Observer stream waiting...</div>
    <div id="perf-label">Perf: waiting...</div>
    <div id="ux-hint">Hover for OHLC tooltip, click to select candle, drag to pan, wheel to zoom, double click to fit. Touch: drag to pan, pinch to zoom. Shortcuts: F/A/C/T/Y/M/H/G, arrows, Home/End, Esc.</div>

    <script type="module">
        import { NexusCharts } from "./nexus-charts.esm.js";

        const chart = new NexusCharts({
            canvasId: "canvas",
            wasmScriptPath: "wasm/nexuscharts.js",
            wasmBinaryPath: "wasm/nexuscharts.wasm"
        });

        const generateCandles = (count = 36) => {
            const candles = [];
            let price = 102;
            const volumeBase = 180;
            for (let i = 0; i < count; i += 1) {
                const wave = Math.sin(i * 0.32) * 1.4;
                const pull = Math.cos(i * 0.19) * 0.9;
                const noise = (Math.random() - 0.5) * 0.8;

                const open = price;
                const close = open + wave + pull + noise;
                const volume = volumeBase + (Math.abs(close - open) * 420) + (Math.random() * 120);
                const high = Math.max(open, close) + 0.7 + (Math.random() * 0.9);
                const low = Math.min(open, close) - 0.7 - (Math.random() * 0.9);

                candles.push({
                    time: i + 1,
                    open: Number(open.toFixed(2)),
                    high: Number(high.toFixed(2)),
                    low: Number(low.toFixed(2)),
                    close: Number(close.toFixed(2)),
                    volume: Number(volume.toFixed(2))
                });

                price = close;
            }
            return candles;
        };

        const generateNextCandle = (index, lastClose) => {
            const wave = Math.sin(index * 0.32) * 1.4;
            const pull = Math.cos(index * 0.19) * 0.9;
            const noise = (Math.random() - 0.5) * 0.8;

            const open = lastClose;
            const close = open + wave + pull + noise;
            const volumeBase = 180;
            const volume = volumeBase + (Math.abs(close - open) * 420) + (Math.random() * 120);
            const high = Math.max(open, close) + 0.7 + (Math.random() * 0.9);
            const low = Math.min(open, close) - 0.7 - (Math.random() * 0.9);

            return {
                time: index + 1,
                open: Number(open.toFixed(2)),
                high: Number(high.toFixed(2)),
                low: Number(low.toFixed(2)),
                close: Number(close.toFixed(2)),
                volume: Number(volume.toFixed(2))
            };
        };
        const maxObserverFrames = 180;
        const buildObserverFrames = (candles, maxFrames = maxObserverFrames) => {
            const frames = [];
            if (!candles.length) {
                return frames;
            }
            const total = candles.length;
            const span = Math.min(maxFrames, total);
            const start = total - span;
            let cumulativePnl = 0;
            for (let i = start; i < total; i += 1) {
                const candle = candles[i];
                const delta = candle.close - candle.open;
                const reward = delta;
                cumulativePnl += delta;

                let action = "hold";
                if (delta > 0.2) action = "buy";
                else if (delta < -0.2) action = "sell";

                const confidence = Math.min(1, 0.45 + (Math.abs(delta) / 3.5));
                const frameIndex = i - start;
                const x = -0.9 + ((1.8 * frameIndex) / Math.max(1, span - 1));
                const y = action === "buy" ? 0.48 : action === "sell" ? -0.48 : 0.0;

                frames.push({
                    time: candle.time,
                    reward: Number(reward.toFixed(3)),
                    pnl: Number(cumulativePnl.toFixed(3)),
                    confidence: Number(confidence.toFixed(3)),
                    action,
                    x: Number(x.toFixed(3)),
                    y
                });
            }
            return frames;
        };

        chart.waitUntilReady().then(() => {
            const metricsLabel = document.getElementById("metrics-label");
            const perfLabel = document.getElementById("perf-label");
            const streamToggle = document.getElementById("stream-toggle");
            const datasetSelect = document.getElementById("dataset-size");
            const datasetLoad = document.getElementById("dataset-load");
            const datasetStatus = document.getElementById("dataset-status");
            const themeSelect = document.getElementById("theme-preset");
            const datasetThreshold = 50000;
            let streamEnabled = true;
            let overlaysEnabled = true;
            let analyticsEnabled = true;

            const themePresets = {
                midnight: {
                    chart: {},
                    shell: {
                        pageBg: "#1e1e24",
                        pageText: "#ffffff",
                        containerBorder: "rgba(120, 148, 188, 0.32)",
                        containerShadow: "0 4px 12px rgba(0, 0, 0, 0.5)",
                        shellBg: "rgba(12, 22, 40, 0.85)",
                        shellBorder: "rgba(120, 148, 188, 0.4)",
                        shellHover: "rgba(156, 186, 232, 0.7)",
                        shellText: "#dce7ff",
                        shellMuted: "#9bb3d6",
                        shellSubtle: "#7fa1d0",
                        shellHint: "#6f86aa",
                        shellAccent: "#ffcc66"
                    }
                },
                ocean: {
                    chart: {
                        surface: {
                            chartBackground: "#08131f",
                            panelBackground: "rgba(5, 20, 36, 0.94)",
                            panelBorder: "rgba(92, 150, 204, 0.42)",
                            axisLabelBackground: "rgba(5, 20, 36, 0.9)",
                            axisLabelText: "#91b8df",
                            menuBackground: "rgba(6, 19, 35, 0.96)",
                            menuBorder: "rgba(98, 162, 222, 0.45)",
                            menuText: "#d8efff"
                        },
                        controls: {
                            toggleActiveFill: "rgba(18, 74, 122, 0.92)",
                            activeStroke: "rgba(102, 214, 255, 0.58)",
                            activeHint: "#9fe8ff"
                        },
                        crosshair: {
                            line: "rgba(98, 198, 255, 0.55)",
                            point: "rgba(94, 237, 255, 0.92)",
                            labelBorder: "rgba(102, 214, 255, 0.54)"
                        },
                        analytics: {
                            heatmapHold: "#ffd166",
                            heatmapBuy: "#2ee6a6",
                            heatmapSell: "#ff6b7a",
                            rewardCurve: "#5cd7ff",
                            pnlCurve: "#7fe1ff"
                        },
                        indicators: {
                            sma: "#67e8f9",
                            ema: "#38bdf8",
                            rsi: "#60a5fa"
                        },
                        series: {
                            line: "#6ee7ff",
                            area: "#2dd4bf",
                            histogram: "#fbbf24",
                            volume: "#38bdf8",
                            custom: "#a5f3fc"
                        },
                        candles: {
                            up: "#22c55e",
                            down: "#fb7185",
                            wick: "#d7ebff"
                        }
                    },
                    shell: {
                        pageBg: "#111825",
                        pageText: "#eff8ff",
                        containerBorder: "rgba(92, 150, 204, 0.28)",
                        containerShadow: "0 6px 18px rgba(3, 10, 18, 0.55)",
                        shellBg: "rgba(8, 24, 42, 0.88)",
                        shellBorder: "rgba(92, 150, 204, 0.45)",
                        shellHover: "rgba(124, 205, 255, 0.8)",
                        shellText: "#daf2ff",
                        shellMuted: "#8db8dc",
                        shellSubtle: "#74a4d4",
                        shellHint: "#5f85ab",
                        shellAccent: "#9fe8ff"
                    }
                },
                ember: {
                    chart: {
                        surface: {
                            chartBackground: "#211918",
                            panelBackground: "rgba(33, 18, 15, 0.94)",
                            panelBorder: "rgba(201, 129, 80, 0.38)",
                            axisLabelBackground: "rgba(33, 18, 15, 0.88)",
                            axisLabelText: "#d6b29a",
                            menuBackground: "rgba(37, 20, 18, 0.96)",
                            menuBorder: "rgba(220, 141, 89, 0.42)",
                            menuText: "#ffe6d5"
                        },
                        controls: {
                            actionFill: "rgba(46, 26, 22, 0.92)",
                            toggleActiveFill: "rgba(111, 54, 28, 0.9)",
                            toggleInactiveFill: "rgba(46, 26, 22, 0.78)",
                            activeStroke: "rgba(255, 170, 109, 0.55)",
                            inactiveStroke: "rgba(194, 131, 90, 0.28)",
                            actionText: "#ffe6d5",
                            toggleActiveText: "#fff2e8",
                            toggleInactiveText: "#d7b09b",
                            activeHint: "#ffd6a8",
                            inactiveHint: "rgba(223, 177, 149, 0.72)"
                        },
                        tooltip: {
                            background: "rgba(37, 20, 18, 0.94)",
                            border: "rgba(220, 141, 89, 0.44)",
                            label: "#ffb97b",
                            value: "#ffe6d5",
                            positive: "#58e49f",
                            negative: "#ff7c7c"
                        },
                        analytics: {
                            heatmapHold: "#ffb347",
                            heatmapBuy: "#55d6a6",
                            heatmapSell: "#ff6f7d",
                            rewardCurve: "#ffbf69",
                            pnlCurve: "#ff8f70"
                        },
                        indicators: {
                            sma: "#ffb347",
                            ema: "#ff8f70",
                            rsi: "#f472b6"
                        },
                        series: {
                            line: "#ffb347",
                            area: "#fb923c",
                            histogram: "#f59e0b",
                            volume: "#c084fc",
                            custom: "#f472b6"
                        },
                        candles: {
                            up: "#3ad29f",
                            down: "#ff6767",
                            wick: "#ffe5d0"
                        }
                    },
                    shell: {
                        pageBg: "#241c1b",
                        pageText: "#fff4ec",
                        containerBorder: "rgba(201, 129, 80, 0.28)",
                        containerShadow: "0 6px 18px rgba(22, 11, 8, 0.55)",
                        shellBg: "rgba(40, 22, 19, 0.88)",
                        shellBorder: "rgba(201, 129, 80, 0.42)",
                        shellHover: "rgba(255, 190, 129, 0.8)",
                        shellText: "#ffe8da",
                        shellMuted: "#d4b29c",
                        shellSubtle: "#c99f88",
                        shellHint: "#a68070",
                        shellAccent: "#ffbf69"
                    }
                }
            };

            const applyShellTheme = (shell) => {
                const root = document.documentElement;
                root.style.setProperty("--page-bg", shell.pageBg);
                root.style.setProperty("--page-text", shell.pageText);
                root.style.setProperty("--container-border", shell.containerBorder);
                root.style.setProperty("--container-shadow", shell.containerShadow);
                root.style.setProperty("--shell-bg", shell.shellBg);
                root.style.setProperty("--shell-border", shell.shellBorder);
                root.style.setProperty("--shell-hover", shell.shellHover);
                root.style.setProperty("--shell-text", shell.shellText);
                root.style.setProperty("--shell-muted", shell.shellMuted);
                root.style.setProperty("--shell-subtle", shell.shellSubtle);
                root.style.setProperty("--shell-hint", shell.shellHint);
                root.style.setProperty("--shell-accent", shell.shellAccent);
            };

            const applyThemePreset = (presetName) => {
                const preset = themePresets[presetName] ?? themePresets.midnight;
                chart.applyTheme(preset.chart);
                applyShellTheme(preset.shell);
            };

            const setStreamState = (nextState) => {
                streamEnabled = nextState;
                if (streamToggle) {
                    streamToggle.textContent = `Stream: ${streamEnabled ? "On" : "Off"}`;
                    streamToggle.classList.toggle("is-paused", !streamEnabled);
                }
            };

            if (streamToggle) {
                streamToggle.addEventListener("click", () => {
                    setStreamState(!streamEnabled);
                });
            }

            const series = chart.createSeries({ type: "candlestick" });
            const lineSeries = chart.createSeries({ type: "line", lineWidth: 2 });
            const areaSeries = chart.createSeries({ type: "area", opacity: 0.12, lineWidth: 1.5 });
            const histSeries = chart.createSeries({ type: "histogram", opacity: 0.18, barWidthRatio: 0.45 });
            const volumeSeries = chart.createSeries({ type: "volume", opacity: 0.22, barWidthRatio: 0.55 });

            const buildCustomData = (source) => source.map((c, i) => ({
                ...c,
                value: c.close + (Math.sin(i * 0.55) * 1.4)
            }));

            const customSeries = chart.createSeries({
                type: "custom",
                lineWidth: 1.5,
                valueKey: "value",
                renderer: (ctx, points, meta) => {
                    ctx.save();
                    ctx.strokeStyle = meta.style.color;
                    ctx.lineWidth = meta.style.lineWidth;
                    ctx.setLineDash([4, 3]);
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length; i += 1) {
                        ctx.lineTo(points[i].x, points[i].y);
                    }
                    ctx.stroke();
                    ctx.setLineDash([]);

                    ctx.fillStyle = meta.style.color;
                    ctx.globalAlpha = 0.35;
                    for (const point of points) {
                        ctx.beginPath();
                        ctx.arc(point.x, point.y, 2.2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
            });

            let candles = [];
            let streamIndex = 0;
            let cumulativePnl = 0;
            let liveIndex = 0;
            let lastClose = 102;
            let inProgressTicks = 0;

            const updateDatasetStatus = () => {
                if (datasetStatus) {
                    const modeLabel = overlaysEnabled ? "Full" : "Benchmark";
                    datasetStatus.textContent = `Size: ${candles.length.toLocaleString()} | Mode: ${modeLabel}`;
                }
            };

            const applyDrawings = (dataset) => {
                chart.clearDrawings();
                if (!dataset.length) {
                    return;
                }
                const clampIndex = (index) => Math.min(Math.max(0, index), dataset.length - 1);
                const anchorStart = dataset[clampIndex(Math.max(2, Math.floor(dataset.length * 0.25)))];
                const anchorEnd = dataset[clampIndex(Math.max(10, Math.floor(dataset.length * 0.7)))];

                chart.addDrawing({
                    type: "line",
                    points: [
                        { time: anchorStart.time, price: anchorStart.low - 0.6 },
                        { time: anchorEnd.time, price: anchorEnd.high + 0.8 }
                    ],
                    style: { width: 2 }
                });

                chart.addDrawing({
                    type: "horizontal_line",
                    price: dataset[Math.floor(dataset.length * 0.5)].close - 1.2,
                    style: { width: 1.5, dash: [6, 4] }
                });

                chart.addDrawing({
                    type: "vertical_line",
                    time: anchorEnd.time,
                    style: { width: 1.2, dash: [4, 4] }
                });
            };

            const applySeriesData = (dataset, enableOverlays) => {
                series.setData(dataset);
                if (enableOverlays) {
                    lineSeries.setData(dataset);
                    areaSeries.setData(dataset);
                    histSeries.setData(dataset);
                    volumeSeries.setData(dataset);

                    const customData = buildCustomData(dataset);
                    customSeries.setData(customData);
                } else {
                    lineSeries.setData([]);
                    areaSeries.setData([]);
                    histSeries.setData([]);
                    volumeSeries.setData([]);
                    customSeries.setData([]);
                }
            };

            const applyIndicators = (enableOverlays) => {
                chart.clearIndicators();
                if (!enableOverlays) {
                    return;
                }
                chart.addIndicator({ type: "sma", period: 8 });
                chart.addIndicator({ type: "ema", period: 13 });
                chart.addIndicator({ type: "rsi", period: 14, pane: "lower" });
            };

            const applyDataset = (count, pauseStream = true) => {
                overlaysEnabled = count < datasetThreshold;
                analyticsEnabled = overlaysEnabled;
                const nextCandles = generateCandles(count);
                candles = nextCandles;

                applyIndicators(overlaysEnabled);
                applySeriesData(candles, overlaysEnabled);

                chart.configureAnalytics({
                    showHeatmap: analyticsEnabled,
                    showRewardCurve: analyticsEnabled,
                    showPnlCurve: analyticsEnabled,
                    maxFrames: maxObserverFrames
                });
                const frames = analyticsEnabled ? buildObserverFrames(candles, maxObserverFrames) : [];
                chart.setObserverFrames(frames);
                if (overlaysEnabled) {
                    applyDrawings(candles);
                } else {
                    chart.clearDrawings();
                }

                streamIndex = frames.length;
                cumulativePnl = frames.length ? frames[frames.length - 1].pnl : 0;
                liveIndex = candles.length;
                lastClose = candles.length ? candles[candles.length - 1].close : 102;
                inProgressTicks = 0;

                updateDatasetStatus();

                if (pauseStream) {
                    setStreamState(false);
                }
            };

            if (datasetLoad && datasetSelect) {
                datasetLoad.addEventListener("click", () => {
                    const size = Number(datasetSelect.value) || 200;
                    applyDataset(size, true);
                });
            }

            const defaultDatasetSize = 200;
            if (datasetSelect) {
                datasetSelect.value = String(defaultDatasetSize);
            }
            if (themeSelect) {
                themeSelect.value = "midnight";
                themeSelect.addEventListener("change", () => {
                    applyThemePreset(themeSelect.value);
                });
            }
            applyThemePreset("midnight");
            applyDataset(defaultDatasetSize, false);

            setInterval(() => {
                if (!streamEnabled) {
                    return;
                }
                let activeCandle;

                if (inProgressTicks < 2) {
                    const last = candles[candles.length - 1];
                    const drift = (Math.random() - 0.5) * 0.9;
                    const close = last.close + drift;
                    const high = Math.max(last.high, close);
                    const low = Math.min(last.low, close);
                    const volume = (last.volume ?? 0) + (Math.abs(drift) * 120) + (Math.random() * 30);

                    activeCandle = {
                        ...last,
                        close: Number(close.toFixed(2)),
                        high: Number(high.toFixed(2)),
                        low: Number(low.toFixed(2)),
                        volume: Number(volume.toFixed(2))
                    };

                    candles[candles.length - 1] = activeCandle;
                    lastClose = activeCandle.close;

                    series.updateLast(activeCandle);
                    if (overlaysEnabled) {
                        lineSeries.updateLast(activeCandle);
                        areaSeries.updateLast(activeCandle);
                        histSeries.updateLast(activeCandle);
                        volumeSeries.updateLast(activeCandle);

                        const customPoint = {
                            ...activeCandle,
                            value: activeCandle.close + (Math.sin((candles.length - 1) * 0.55) * 1.4)
                        };
                        customSeries.updateLast(customPoint);
                    }

                    inProgressTicks += 1;
                } else {
                    activeCandle = generateNextCandle(liveIndex, lastClose);
                    candles.push(activeCandle);
                    lastClose = activeCandle.close;

                    series.append(activeCandle);
                    if (overlaysEnabled) {
                        lineSeries.append(activeCandle);
                        areaSeries.append(activeCandle);
                        histSeries.append(activeCandle);
                        volumeSeries.append(activeCandle);

                        const customPoint = {
                            ...activeCandle,
                            value: activeCandle.close + (Math.sin(liveIndex * 0.55) * 1.4)
                        };
                        customSeries.append(customPoint);
                    }

                    inProgressTicks = 0;
                    liveIndex += 1;
                }

                const reward = activeCandle.close - activeCandle.open;
                cumulativePnl += reward;

                let action = "hold";
                if (reward > 0.2) action = "buy";
                else if (reward < -0.2) action = "sell";

                const confidence = Math.min(1, 0.45 + (Math.abs(reward) / 3.5));
                const x = -0.9 + ((1.8 * (streamIndex % maxObserverFrames)) / Math.max(1, maxObserverFrames - 1));
                const y = action === "buy" ? 0.48 : action === "sell" ? -0.48 : 0.0;

                if (analyticsEnabled) {
                    chart.pushObserverFrame({
                        time: activeCandle.time,
                        reward: Number(reward.toFixed(3)),
                        pnl: Number(cumulativePnl.toFixed(3)),
                        confidence: Number(confidence.toFixed(3)),
                        action,
                        x: Number(x.toFixed(3)),
                        y
                    });

                    const metrics = chart.getObserverMetrics(60);
                    if (metricsLabel) {
                        metricsLabel.textContent =
                            `Observer stream (${metrics.source}) | frames: ${metrics.frameCount} | ` +
                            `R: ${metrics.lastReward.toFixed(3)} | ` +
                            `P: ${metrics.lastPnl.toFixed(3)} | ` +
                            `avg60: ${metrics.averageReward.toFixed(3)}`;
                    }
                } else if (metricsLabel) {
                    metricsLabel.textContent = "Observer stream disabled (benchmark mode).";
                }

                const perf = chart.getPerfMetrics(60);
                if (perfLabel) {
                    const heap = (perf.heapUsedMB !== null && perf.heapTotalMB !== null)
                        ? `${perf.heapUsedMB.toFixed(1)}/${perf.heapTotalMB.toFixed(1)} MB`
                        : "n/a";
                    perfLabel.textContent =
                        `Redraw ms (avg/max/last): ${perf.avgRedrawMs.toFixed(2)} / ` +
                        `${perf.maxRedrawMs.toFixed(2)} / ${perf.lastRedrawMs.toFixed(2)} | ` +
                        `samples: ${perf.sampleCount} | heap: ${heap}`;
                }

                streamIndex += 1;
            }, 1200);
        });

        window.nexusChart = chart;
    </script>
</body>

</html>
